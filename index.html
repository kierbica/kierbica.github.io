        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 64px 24px 80px;
        }

        /* ═══ Profile ═══ */
        .profile { text-align: center; margin-bottom: 44px; }

        .avatar {
            width: 88px; height: 88px; border-radius: 50%;
            background: linear-gradient(135deg, #27272a, #3f3f46);
            border: 2px solid #27272a;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 700; color: #fafafa;
            margin: 0 auto 20px;
            transition: border-color 0.4s;
        }

        .avatar:hover { border-color: #52525b; }

        .profile h1 {
            font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
            color: #fafafa; margin-bottom: 4px;
        }

        .profile .handle {
            font-size: 14px; font-weight: 500; color: #71717a;
        }

        .profile .bio {
            font-size: 13px; color: #71717a; margin-top: 12px;
            line-height: 1.7; max-width: 360px; margin-left: auto; margin-right: auto;
        }

        .profile .bio strong { color: #a1a1aa; font-weight: 600; }

        /* ═══ Social Bubbles ═══ */
        .social-row {
            display: flex; justify-content: center; gap: 12px;
            margin-bottom: 52px;
            flex-wrap: wrap;
        }

        .bubble {
            width: 44px; height: 44px; border-radius: 50%;
            background: #18181b;
            border: 1px solid #27272a;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bubble svg {
            width: 20px; height: 20px;
            transition: transform 0.3s;
        }

        .bubble:hover {
            transform: translateY(-4px);
            border-color: #3f3f46;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .bubble:hover svg { transform: scale(1.1); }
        .bubble:active { transform: translateY(-1px); }

        /* ═══ Links ═══ */
        .links { display: flex; flex-direction: column; gap: 8px; margin-bottom: 48px; }

        .link-card {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 14px;
            text-decoration: none; color: #fafafa;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: #3f3f46;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .link-card:active { transform: translateY(0); }

        .link-card .icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; background: #27272a;
        }

        .link-card .icon svg { width: 18px; height: 18px; }

        .link-card .info { flex: 1; min-width: 0; }
        .link-card .title { font-size: 13px; font-weight: 600; }
        .link-card .subtitle { font-size: 12px; color: #71717a; margin-top: 1px; }
        .link-card .arrow { color: #52525b; font-size: 14px; flex-shrink: 0; }

        /* ═══ Section ═══ */
        .section-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.1em; color: #52525b;
            margin-bottom: 14px;
        }

        /* ═══ Divider ═══ */
        .divider {
            height: 1px; background: #18181b; margin: 8px 0 40px;
        }

        /* ═══ Donation ═══ */
        .donate-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 28px 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .donate-card h2 {
            font-size: 16px; font-weight: 700; margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .donate-card p {
            font-size: 13px; color: #71717a; line-height: 1.7;
            max-width: 340px; margin: 0 auto;
        }

        .donate-card .accent {
            color: #d4d4d8;
            font-weight: 600;
        }

        /* ═══ Footer ═══ */
        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #18181b;
        }

        .footer p {
            font-size: 12px; color: #3f3f46;
            font-weight: 500;
        }

        /* ═══ Responsive ═══ */
        @media (max-width: 360px) {
            .container { padding: 48px 16px 64px; }
            .social-row { gap: 10px; }
            .bubble { width: 40px; height: 40px; }
        }
    </style>
